name: Cross-Platform Release Build

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact_name: PrayerTime-Windows
            artifact_path: build\windows\x64\runner\Release\*
          - os: ubuntu-latest
            target: linux
            artifact_name: PrayerTime-Linux
            artifact_path: build/linux/x64/release/bundle/*
          - os: macos-13
            target: macos
            artifact_name: PrayerTime-macOS
            artifact_path: build/macos/Build/Products/Release/window_lock_prayer.app

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐧 Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Flutter Dependencies
        run: flutter pub get

      - name: 🚀 Build Release
        run: flutter build ${{ matrix.target }} --release

      - name: 🗜️ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
